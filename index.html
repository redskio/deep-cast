let village = null;
function defaultVillage() {
  return {
    day: 1, season: 0, timeOfDay: 0, // 0=morning,1=noon,2=evening,3=night
    gold: 100,
    energy: 80, maxEnergy: 80,
    buildingLevels: { dock: 0, market: 0, home: 0, shrine: 0 },
    npcFriendship: { granny: 0, captain: 0, rival: 0, mystic: 0 },
    npcGifted: {},
    inventory: [], // {name, rarity, size, goldValue, count}
    inventoryMax: 20,
    questsActive: [],
    questsCompleted: [],
    achievements: [],
    totalFishCaught: 0, totalGoldEarned: 0, totalDaysPlayed: 0,
    fishSoldToday: 0,
    dailyQuestsDone: 0,
  };
}

function saveVillage() {
  if (village) localStorage.setItem('deepcast_village', JSON.stringify(village));
}
function loadVillage() {
  try {
    const d = localStorage.getItem('deepcast_village');
    if (d) { village = JSON.parse(d); return true; }
  } catch(e) {}
  return false;
}

function getSeasonKey() { return SEASON_KEYS[village.season % 4]; }
function getTimeIcon() { return TIME_ICONS[village.timeOfDay]; }
function getTimeName() { return TIME_OF_DAY[village.timeOfDay]; }
function getSellMulti() {
  const lvl = village.buildingLevels.market;
  return [1.0, 1.2, 1.5][lvl] || 1.0;
}
function getEnergyMax() {
  const lvl = village.buildingLevels.home;
  return [80, 100, 130][lvl] || 80;
}
function getInvMax() {
  const lvl = village.buildingLevels.home;
  return [20, 40, 80][lvl] || 20;
}
function getFishingBonus() {
  const lvl = village.buildingLevels.dock;
  return [0, 0.10, 0.25][lvl] || 0;
}
function getLuckBonus() {
  const lvl = village.buildingLevels.shrine;
  return [0, 0.05, 0.15][lvl] || 0;
}

function advanceTime() {
  village.timeOfDay++;
  if (village.timeOfDay >= 4) {
    village.timeOfDay = 0;
    village.day++;
    village.energy = getEnergyMax();
    village.fishSoldToday = 0;
    village.dailyQuestsDone = 0;
    village.npcGifted = {};
    if (village.day > DAYS_PER_SEASON) {
      village.day = 1;
      village.season++;
    }
    village.totalDaysPlayed++;
    currentWeatherKey = pickWeather();
    initWeatherParticles();
  }
  saveVillage();
}

function addToInventory(fish) {
  if (village.inventory.length >= getInvMax()) return false;
  village.inventory.push({ name: fish.name, rarity: fish.rarity, size: fish.size, goldValue: fish.goldValue });
  return true;
}

function sellFish(idx) {
  if (idx < 0 || idx >= village.inventory.length) return 0;
  const f = village.inventory[idx];
  const gold = Math.floor(f.goldValue * getSellMulti());
  village.gold += gold;
  village.totalGoldEarned += gold;
  village.fishSoldToday += gold;
  village.inventory.splice(idx, 1);
  checkQuests('sell_gold', gold);
  saveVillage();
  return gold;
}

function sellAllFish() {
  let total = 0;
  while (village.inventory.length > 0) total += sellFish(0);
  return total;
}

// ─── UTILITY ───
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// ─── VIBRATION FEEDBACK ───
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ─── WEATHER HELPERS ───
function pickWeather() {
  const entries = Object.entries(WEATHER);
  const totalWeight = entries.reduce((s, [,w]) => s + w.weight, 0);
  let roll = Math.random() * totalWeight;
  for (const [key, data] of entries) {
    roll -= data.weight;
    if (roll <= 0) return key;
  }
  return 'clear';
}

function initWeatherParticles() {
  weatherParticles = [];
  if (currentWeatherKey === 'rain' || currentWeatherKey === 'storm') {
    const count = isMobile ? 80 : 200;
    for (let i = 0; i < count; i++) {
      weatherParticles.push({
        x: rand(0, canvas.width),
        y: rand(-canvas.height, canvas.height),
        speed: rand(8, 14),
        length: rand(8, 18),
      });
    }
  }
}

function updateWeatherParticles(dt) {
  if (currentWeatherKey === 'rain' || currentWeatherKey === 'storm') {
    for (const p of weatherParticles) {
      p.x += 2 * 60 * dt;
      p.y += p.speed * 60 * dt;
      if (p.y > canvas.height) {
        p.y = rand(-20, -5);
        p.x = rand(0, canvas.width);
      }
      if (p.x > canvas.width) p.x = 0;
    }
  }
  // Storm flash
  if (currentWeatherKey === 'storm') {
    if (Math.random() < 0.002) stormFlashAlpha = 0.3;
    if (stormFlashAlpha > 0) stormFlashAlpha -= dt * 2;
  } else {
    stormFlashAlpha = 0;
  }
}

function drawWeatherEffects(t) {
  if (currentWeatherKey === 'rain' || currentWeatherKey === 'storm') {
    ctx.strokeStyle = 'rgba(170,200,255,0.3)';
    ctx.lineWidth = 1;
    for (const p of weatherParticles) {
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + 2, p.y + p.length);
      ctx.stroke();
    }
  }
  if (currentWeatherKey === 'fog') {
    for (let i = 0; i < 5; i++) {
      const bandY = canvas.height * (0.2 + i * 0.15) + Math.sin(t * 0.3 + i * 1.5) * 30;
      ctx.fillStyle = 'rgba(180,200,220,0.06)';
      ctx.fillRect(0, bandY, canvas.width, 40 + i * 10);
    }
  }
  if (stormFlashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,240,${stormFlashAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

// ─── SEASON HELPERS ───
function getCurrentSeason() {
  if (!run) return SEASONS.spring;
  const idx = Math.floor(run.seasonCounter / 25) % 4;
  return SEASONS[SEASON_KEYS[idx]];
}
function getCurrentSeasonKey() {
  if (!run) return 'spring';
  const idx = Math.floor(run.seasonCounter / 25) % 4;
  return SEASON_KEYS[idx];
}

// ─── PARTICLES ───
let particles = [];
function spawnParticles(x, y, color, count = 10, spread = 30) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: rand(-spread, spread) / 10, vy: rand(-spread, 5) / 10,
      life: rand(0.5, 1.5), maxLife: 1.5, size: rand(2, 5), color, alpha: 1
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * 60 * dt;
    p.y += p.vy * 60 * dt;
    p.vy += 0.05 * 60 * dt;
    p.life -= dt;
    p.alpha = clamp(p.life / p.maxLife, 0, 1);
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── WATER ANIMATION ───
let waterOffset = 0;
function drawWater(y, h, baseColor, t) {
  waterOffset += 0.01;
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  grad.addColorStop(0, baseColor || COLORS.water);
  grad.addColorStop(1, COLORS.waterDeep);
  ctx.fillStyle = grad;
  ctx.fillRect(0, y, canvas.width, h);

  // wave lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    const waveY = y + 20 + i * (h / 8);
    for (let x = 0; x < canvas.width; x += 5) {
      const offset = Math.sin((x + waterOffset * 200 + i * 100) * 0.01) * (6 + i * 2);
      if (x === 0) ctx.moveTo(x, waveY + offset);
      else ctx.lineTo(x, waveY + offset);
    }
    ctx.stroke();
  }
}

// ─── STARFIELD ───
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({ x: rand(0, 2000), y: rand(0, 400), size: rand(0.5, 2.5), twinkle: rand(0, Math.PI * 2), speed: rand(0.5, 2) });
  }
}
initStars();

function drawStars(t) {
  for (const s of stars) {
    const alpha = 0.3 + Math.sin(s.twinkle + t * s.speed) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * canvas.width / 2000, s.y * canvas.height / 800, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── TEXT UTILS ───
function drawText(text, x, y, { size = 16, color = COLORS.uiText, align = 'left', baseline = 'top', shadow = false, font = '' } = {}) {
  ctx.font = `${font} ${size}px 'Segoe UI', sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = baseline;
  if (shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(text, x + 2, y + 2);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawPanel(x, y, w, h, { fill = COLORS.ui, border = COLORS.uiBorder, radius = 8, alpha = 0.92 } = {}) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = fill;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, radius);
  ctx.fill();
  ctx.strokeStyle = border;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawBar(x, y, w, h, value, max, fgColor, bgColor, label = '') {
  ctx.fillStyle = bgColor;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 4); ctx.fill();
  const fillW = clamp(value / max, 0, 1) * w;
  ctx.fillStyle = fgColor;
  ctx.beginPath(); ctx.roundRect(x, y, fillW, h, 4); ctx.fill();
  if (label) drawText(label, x + w / 2, y + h / 2, { size: 11, align: 'center', baseline: 'middle', color: '#fff' });
}

// ─── BUTTON SYSTEM ───
let buttons = [];
let hoveredBtn = null;
function clearButtons() { buttons = []; hoveredBtn = null; }
function addButton(id, x, y, w, h, label, opts = {}) {
  buttons.push({ id, x, y, w, h, label, ...opts });
}
function drawButtons(t) {
  for (const b of buttons) {
    const hovered = hoveredBtn === b.id;
    const baseColor = b.color || COLORS.accent;
    const bColor = hovered ? COLORS.accentLight : baseColor;
    ctx.fillStyle = bColor;
    ctx.globalAlpha = b.disabled ? 0.4 : 0.9;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 6); ctx.fill();
    ctx.strokeStyle = hovered ? '#fff' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = hovered ? 2 : 1;
    ctx.stroke();
    ctx.globalAlpha = b.disabled ? 0.4 : 1;
    drawText(b.label, b.x + b.w / 2, b.y + b.h / 2, { size: b.fontSize || 15, align: 'center', baseline: 'middle', color: '#fff', font: 'bold' });
    if (b.sub) {
      drawText(b.sub, b.x + b.w / 2, b.y + b.h - 8, { size: 10, align: 'center', baseline: 'bottom', color: 'rgba(255,255,255,0.6)' });
    }
    ctx.globalAlpha = 1;
  }
}

// ─── MOBILE DETECTION & SCALING ───
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
function getScale() {
  if (!isMobile) return 1;
  const minDim = Math.min(canvas.width, canvas.height);
  if (minDim < 400) return 0.65;
  if (minDim < 600) return 0.8;
  return 0.9;
}

// ─── INPUT ───
let mouse = { x: 0, y: 0, down: false, clicked: false };
let keys = {};

function updateHover(x, y) {
  mouse.x = x; mouse.y = y;
  hoveredBtn = null;
  for (const b of buttons) {
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
      hoveredBtn = b.id;
      break;
    }
  }
}

// Mouse events (desktop)
canvas.addEventListener('mousemove', e => { updateHover(e.clientX, e.clientY); });
canvas.addEventListener('mousedown', e => { mouse.down = true; mouse.clicked = true; });
canvas.addEventListener('mouseup', e => { mouse.down = false; });

// Touch events (mobile)
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateHover(t.clientX, t.clientY);
  mouse.down = true;
  mouse.clicked = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateHover(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  mouse.down = false;
}, { passive: false });
canvas.addEventListener('touchcancel', e => { mouse.down = false; });

window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function consumeClick() {
  if (!mouse.clicked) return null;
  mouse.clicked = false;
  for (const b of buttons) {
    if (mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h && !b.disabled) {
      return b.id;
    }
  }
  return '__none__';
}

// ─── GENERATE FISH FOR CATCH ───
function generateFish(location) {
  const weather = WEATHER[currentWeatherKey];
  const season = getCurrentSeason();
  const rarityBonus = location.rarityBonus + run.luckBonus + run.tempRarity + weather.rarityMod + season.rarityMod;

  let roll = Math.random();
  let selectedRarity = 'common';
  const rarities = Object.entries(RARITY);
  // reverse so we check rarest first
  for (let i = rarities.length - 1; i >= 0; i--) {
    const [key, data] = rarities[i];
    const adjustedChance = data.chance + (key !== 'common' ? rarityBonus * data.chance : 0);
    if (roll < adjustedChance) { selectedRarity = key; break; }
    roll -= adjustedChance;
  }

  const candidates = FISH_DATA.filter(f => f.rarity === selectedRarity);
  if (candidates.length === 0) return generateFish(location); // fallback
  const template = pick(candidates);
  const size = randInt(template.minSize, template.maxSize);
  const sizeMulti = size / template.minSize;

  const goldValue = Math.floor(template.baseGold * sizeMulti * RARITY[template.rarity].scoreMulti * run.goldMulti * run.tempGold * weather.goldMod * season.goldMod * (selectedRarity === 'common' ? run.commonGoldMulti : 1));

  return {
    ...template,
    size,
    actualFight: template.fight * sizeMulti * run.tempFight * weather.fightMod * season.fightMod * (1 + location.depth * 0.15),
    goldValue,
    scoreValue: Math.floor(template.baseGold * sizeMulti * RARITY[template.rarity].scoreMulti),
    rarityData: RARITY[template.rarity],
  };
}

// ─── BOSS FISH GENERATION ───
function generateBossFish(location) {
  let bossIdx = 0;
  if (location.depth <= 2) bossIdx = 0;
  else if (location.depth === 3) bossIdx = 1;
  else if (location.depth === 4) bossIdx = 2;
  else bossIdx = 3;

  const template = BOSS_FISH[bossIdx];
  const size = randInt(Math.floor(template.minSize * BOSS_CONFIG.sizeMulti), Math.floor(template.maxSize * BOSS_CONFIG.sizeMulti));
  const sizeMulti = size / template.minSize;
  const weather = WEATHER[currentWeatherKey];
  const season = getCurrentSeason();

  return {
    ...template,
    size,
    isBoss: true,
    actualFight: template.fight * sizeMulti * run.tempFight * weather.fightMod * season.fightMod * (1 + location.depth * 0.15) * BOSS_CONFIG.hpMulti,
    goldValue: Math.floor(template.baseGold * sizeMulti * RARITY[template.rarity].scoreMulti * run.goldMulti * run.tempGold * weather.goldMod * season.goldMod * BOSS_CONFIG.goldMulti),
    scoreValue: Math.floor(template.baseGold * sizeMulti * RARITY[template.rarity].scoreMulti * BOSS_CONFIG.xpMulti),
    rarityData: RARITY[template.rarity],
  };
}

function shouldSpawnBoss() {
  if (run.fishCount < BOSS_CONFIG.firstBossAt) return false;
  return run.fishCount % BOSS_CONFIG.spawnEvery === 0;
}

// ─── MINIGAME ───
function startMinigame(fish) {
  const difficulty = fish.actualFight;
  const isBoss = !!fish.isBoss;
  const czSize = clamp(120 - difficulty * 6, 35, 120) * (isBoss ? BOSS_CONFIG.catchZonePenalty : 1);
  const timer = (15 + fish.size * 0.02 + (isBoss ? BOSS_CONFIG.timerBonus : 0)) * (run.timerMulti || 1);
  run.mg = {
    fish,
    isBoss,
    // Reel bar: player must keep marker in catch zone
    barHeight: 300,
    catchZoneSize: czSize,
    catchZoneY: 100,
    catchZoneVel: (1.5 + difficulty * 0.3) * (Math.random() > 0.5 ? 1 : -1),
    markerY: 150,
    markerVel: 0,
    // Progress
    progress: 0, // 0-100, reach 100 to catch
    progressDecay: 0.25 + difficulty * 0.04,
    progressGain: 0.9,
    // Line tension
    tension: 0,
    maxTension: run.lineMax,
    // Timer
    timer: timer,
    maxTimer: timer,
    // Result
    result: null, // 'caught' or 'escaped' or 'broken'
    resultTimer: 0,
    // Visual
    fishX: canvas.width / 2 + rand(-80, 80),
    fishY: canvas.height / 2 + rand(-30, 30),
    splashTimer: 0,
  };
  run.bossActive = isBoss;
  if (isBoss) vibrate([200,50,200]);
  gameState = 'minigame';
}

// ─── LEVEL UP / PERK ───
function checkLevelUp() {
  if (run.xp >= run.xpToNext) {
    run.xp -= run.xpToNext;
    run.level++;
    run.xpToNext = Math.floor(run.xpToNext * 1.35);
    run.maxHp += 7;
    run.hp = Math.min(run.hp + 20, run.maxHp);
    vibrate([40,40,40,40,120]);
    // offer perk selection
    offerPerks();
    return true;
  }
  return false;
}

let perkChoices = [];
function offerPerks() {
  const available = PERKS.filter(p => !run.perks.includes(p.id));
  perkChoices = [];
  const count = Math.min(3, available.length);
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  for (let i = 0; i < count; i++) perkChoices.push(shuffled[i]);
  if (perkChoices.length > 0) gameState = 'perk_select';
}

function selectPerk(perk) {
  perk.apply(run);
  run.perks.push(perk.id);
  gameState = 'fishing';
}

// ─── RANDOM EVENT ───
function checkRandomEvent() {
  if (run.activeEvent) return;
  if (Math.random() < (run.eventChance || 0.10)) {
    const event = pick(EVENTS);
    run.activeEvent = event;
    run.eventTimer = event.duration;
    event.effect(run);
  }
}

// ─── SCENE: INTRO ───
function updateIntro(dt, t) {
  clearButtons();
  introTimer += dt;

  // Fade in current line
  if (introAlpha < 1) introAlpha = Math.min(1, introAlpha + dt * 1.5);

  // Auto-advance after 3s or on click/tap
  const clicked = consumeClick();
  if (clicked || introTimer > 3.5) {
    introLine++;
    introTimer = 0;
    introAlpha = 0;
    if (introLine >= STORY_LINES.length) {
      gameState = 'char_select';
    }
  }
}

function drawIntro(t) {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle stars
  drawStars(t);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Story text
  if (introLine < STORY_LINES.length) {
    ctx.globalAlpha = introAlpha;
    drawText(STORY_LINES[introLine], cx, cy, {
      size: isMobile ? 15 : 20, align: 'center', baseline: 'middle',
      color: '#c8c8e0', font: '', shadow: true
    });
    ctx.globalAlpha = 1;
  }

  // Progress dots
  const dotY = cy + 60;
  for (let i = 0; i < STORY_LINES.length; i++) {
    ctx.fillStyle = i <= introLine ? COLORS.accentLight : '#333';
    ctx.beginPath();
    ctx.arc(cx - (STORY_LINES.length - 1) * 8 + i * 16, dotY, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Skip hint
  const skipAlpha = 0.3 + Math.sin(t * 2) * 0.2;
  ctx.globalAlpha = skipAlpha;
  drawText(isMobile ? '탭하여 넘기기' : '클릭하여 넘기기', cx, canvas.height - 40, {
    size: 12, align: 'center', color: COLORS.uiTextDim
  });
  ctx.globalAlpha = 1;
}

// ─── SCENE: TRAVELING (transition animation) ───
function updateTraveling(dt, t) {
  clearButtons();
  travelTimer -= dt;
  if (travelTimer <= 0) {
    gameState = 'fishing';
    resetFishing();
  }
}

function drawTraveling(t) {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawStars(t);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Animated boat/walking
  const progress = 1 - (travelTimer / 2.5);
  const boatX = lerp(cx - 200, cx + 200, easeOut(clamp(progress, 0, 1)));
  const waveY = Math.sin(t * 4) * 5;

  // Water below
  const waterY = cy + 40;
  drawWater(waterY, canvas.height - waterY, run.location.waterColor, t);

  // Boat silhouette
  ctx.fillStyle = '#3d2817';
  ctx.beginPath();
  ctx.moveTo(boatX - 30, waterY + waveY);
  ctx.lineTo(boatX - 40, waterY + waveY - 8);
  ctx.lineTo(boatX + 40, waterY + waveY - 8);
  ctx.lineTo(boatX + 30, waterY + waveY);
  ctx.closePath();
  ctx.fill();
  // Mast
  ctx.strokeStyle = '#5D4037';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(boatX, waterY + waveY - 8); ctx.lineTo(boatX, waterY + waveY - 50); ctx.stroke();
  // Sail
  ctx.fillStyle = 'rgba(200,200,220,0.6)';
  ctx.beginPath();
  ctx.moveTo(boatX, waterY + waveY - 48); ctx.lineTo(boatX + 25, waterY + waveY - 30); ctx.lineTo(boatX, waterY + waveY - 15);
  ctx.fill();

  // Draw character on boat
  if (selectedClass) {
    ctx.save();
    selectedClass.draw(boatX - 5, waterY + waveY - 28, 18);
    ctx.restore();
  }

  // Travel text
  drawText(`${run.location.name}(으)로 이동 중...`, cx, cy - 60, {
    size: isMobile ? 18 : 22, align: 'center', color: COLORS.accentLight, font: 'bold', shadow: true
  });

  const desc = TRAVEL_DESC[run.location.name] || '';
  ctx.globalAlpha = Math.min(1, progress * 3);
  drawText(desc, cx, cy - 25, {
    size: isMobile ? 12 : 15, align: 'center', color: COLORS.uiTextDim
  });
  ctx.globalAlpha = 1;

  // Loading dots
  const dots = '.'.repeat(Math.floor(t * 2) % 4);
  drawText(dots, cx + (isMobile ? 100 : 130), cy - 60, {
    size: isMobile ? 18 : 22, color: COLORS.accentLight
  });

  drawParticles();
}

function drawCodex(t) {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawText('📖 물고기 도감', canvas.width / 2, 40, { size: 28, align: 'center', color: COLORS.accentLight, font: 'bold' });

  // Progress bar
  const caughtCount = unlockedFish.length;
  const totalCount = FISH_DATA.length;
  const progW = isMobile ? canvas.width - 40 : 400;
  const progX = canvas.width / 2 - progW / 2;
  drawBar(progX, 58, progW, 14, caughtCount, totalCount, COLORS.accent, COLORS.uiBorder, `${caughtCount}/${totalCount} 수집 완료`);

  // Filter
  const rarityKeyMap = { '전체': null, '일반': 'common', '고급': 'uncommon', '희귀': 'rare', '영웅': 'epic', '전설': 'legendary', '신화': 'mythic' };
  const filterKey = rarityKeyMap[codexFilter];
  const filteredFish = filterKey ? FISH_DATA.filter(f => f.rarity === filterKey) : FISH_DATA;

  // Card grid
  const cols = isMobile ? 2 : 3;
  const cardW = isMobile ? (canvas.width - 30) / 2 - 5 : 180;
  const cardH = isMobile ? 90 : 110;
  const gap = 10;
  const gridStartX = isMobile ? 15 : canvas.width / 2 - (cols * (cardW + gap) - gap) / 2;
  const gridStartY = 115;

  for (let i = 0; i < filteredFish.length; i++) {
    const fish = filteredFish[i];
    const caught = unlockedFish.includes(fish.name);
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = gridStartX + col * (cardW + gap);
    const cy = gridStartY + row * (cardH + gap);

    if (cy > canvas.height + 50) break; // off screen
    if (cy + cardH < 0) continue;

    const rData = RARITY[fish.rarity];
    const borderColor = caught ? rData.color : '#222';
    const fillColor = caught ? 'rgba(26,26,46,0.95)' : 'rgba(15,15,25,0.95)';

    // Card
    drawPanel(cx, cy, cardW, cardH, { fill: fillColor, border: borderColor, radius: 6 });

    // Fish silhouette
    const fishCX = cx + cardW * 0.25;
    const fishCY = cy + cardH * 0.45;
    const fishSz = isMobile ? 16 : 22;
    ctx.globalAlpha = caught ? 0.7 : 0.15;
    ctx.fillStyle = caught ? rData.color : '#444';
    ctx.beginPath();
    ctx.ellipse(fishCX, fishCY, fishSz, fishSz * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(fishCX - fishSz, fishCY);
    ctx.lineTo(fishCX - fishSz - fishSz * 0.4, fishCY - fishSz * 0.3);
    ctx.lineTo(fishCX - fishSz - fishSz * 0.4, fishCY + fishSz * 0.3);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Name
    const name = caught ? fish.name : '???';
    drawText(name, cx + cardW * 0.55, cy + 12, { size: isMobile ? 11 : 13, color: caught ? '#fff' : '#444', font: 'bold' });

    // Rarity tag
    drawText(rData.name, cx + cardW * 0.55, cy + (isMobile ? 28 : 30), { size: isMobile ? 9 : 10, color: caught ? rData.color : '#333' });

    // Size range
    if (caught) {
      drawText(`${fish.minSize}-${fish.maxSize}cm`, cx + cardW * 0.55, cy + (isMobile ? 42 : 48), { size: isMobile ? 9 : 10, color: COLORS.uiTextDim });
      drawText(`💰 ${fish.baseGold}`, cx + cardW * 0.55, cy + (isMobile ? 56 : 64), { size: isMobile ? 9 : 10, color: COLORS.gold });
    }
  }

  drawButtons(t);
}

function drawLocationSelect(t) {

  const statsY = isMobile ? 58 : 85;
  const clsIcon = run.charClass ? run.charClass.icon : '🎣';
  const clsName = run.charClass ? run.charClass.name : '';
  drawText(`${clsIcon} ${clsName} | Lv.${run.level} | ❤️${Math.ceil(run.hp)}/${run.maxHp} | 💰${run.gold} | ${season.icon}${season.name}`, cx, statsY, {
    size: isMobile ? 11 : 14, align: 'center', color: COLORS.uiTextDim
  });
  drawText(`📊 ${run.score.toLocaleString()}점`, cx, statsY + 18, { size: isMobile ? 11 : 13, align: 'center', color: COLORS.gold });

  // Draw map paths connecting nodes
  const mapW = isMobile ? canvas.width - 60 : Math.min(700, canvas.width - 100);
  const mapH = isMobile ? canvas.height - 200 : 350;
  const mapX = cx - mapW / 2;
  const mapY = isMobile ? 120 : 150;

  const nodePositions = [
    { x: mapX + mapW * 0.08, y: mapY + mapH * 0.8 },
    { x: mapX + mapW * 0.28, y: mapY + mapH * 0.55 },
    { x: mapX + mapW * 0.50, y: mapY + mapH * 0.35 },
    { x: mapX + mapW * 0.72, y: mapY + mapH * 0.55 },
    { x: mapX + mapW * 0.92, y: mapY + mapH * 0.2 },
  ];

  // Draw dotted paths between nodes
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(162, 155, 254, 0.3)';
  ctx.lineWidth = 2;
  for (let i = 0; i < nodePositions.length - 1; i++) {
    const a = nodePositions[i];
    const b = nodePositions[i + 1];
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Draw terrain features between nodes
  for (let i = 0; i < nodePositions.length; i++) {
    const pos = nodePositions[i];
    const loc = LOCATIONS[i];
    const locked = loc.depth > Math.ceil(run.level / 2) + 1;
    const isCurrentLoc = run.location && run.location.name === loc.name;

    // Glow for current location
    if (isCurrentLoc) {
      ctx.fillStyle = 'rgba(108, 92, 231, 0.2)';
      ctx.beginPath(); ctx.arc(pos.x, pos.y, 45, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = COLORS.accentLight;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, 38 + Math.sin(t * 3) * 3, 0, Math.PI * 2); ctx.stroke();
    }

    // Location name label
    const labelY = pos.y + (isMobile ? 38 : 42);
    ctx.globalAlpha = locked ? 0.3 : 1;
    drawText(loc.name, pos.x, labelY, { size: isMobile ? 10 : 12, align: 'center', color: locked ? '#555' : COLORS.uiText, font: 'bold' });
    if (!locked) {
      drawText(`깊이 ${loc.depth}`, pos.x, labelY + 15, { size: 9, align: 'center', color: COLORS.uiTextDim });
    } else {
      drawText(`Lv.${loc.depth * 2 - 1} 필요`, pos.x, labelY + 15, { size: 9, align: 'center', color: '#555' });
    }
    ctx.globalAlpha = 1;
  }

  // Current location indicator (small character)
  if (run.location && selectedClass) {
    const curIdx = LOCATIONS.findIndex(l => l.name === run.location.name);
    if (curIdx >= 0) {
      const pos = nodePositions[curIdx];
      ctx.save();
      selectedClass.draw(pos.x, pos.y - 55, 16);
      ctx.restore();
    }
  }

  drawButtons(t);
}

// ─── SCENE: SHOP ───
let shopScroll = 0;
function updateShop(dt) {
  clearButtons();
  addButton('shop_back', 30, 30, 120, 36, '← 돌아가기', { color: '#2d3436' });

  const cx = canvas.width / 2;
  const slotW = isMobile ? Math.min(300, canvas.width - 40) : 360;
  const slotH = 80;
  const startY = 110;
  const slots = ['rod', 'reel', 'bait'];

  for (let i = 0; i < slots.length; i++) {
    const slot = slots[i];
    const equip = EQUIPMENT[slot];
    const currentTier = run.equipTier[slot];
    const currentItem = equip.tiers[currentTier];
    const nextTier = currentTier + 1;
    const hasNext = nextTier < equip.tiers.length;

    if (hasNext) {
      const nextItem = equip.tiers[nextTier];
      const canAfford = run.gold >= nextItem.cost;
      const meetsLevel = !nextItem.reqLevel || run.level >= nextItem.reqLevel;
      const canBuy = canAfford && meetsLevel;
      let subText = `💰 ${nextItem.cost}G`;
      if (!meetsLevel) subText += ` | Lv.${nextItem.reqLevel} 필요`;
      addButton('buy_' + slot, cx - slotW / 2, startY + i * (slotH + 15), slotW, slotH,
        `${equip.icon} ${currentItem.name} → ${nextItem.name}`, {
        sub: subText,
        disabled: !canBuy,
        fontSize: isMobile ? 13 : 14,
        color: canBuy ? '#27ae60' : '#555',
      });
    } else {
      addButton('max_' + slot, cx - slotW / 2, startY + i * (slotH + 15), slotW, slotH,
        `${equip.icon} ${currentItem.name} (MAX)`, {
        sub: '최고 등급',
        disabled: true,
        fontSize: isMobile ? 13 : 14,
        color: '#555',
      });
    }
  }

  const clicked = consumeClick();
  if (clicked === 'shop_back') { gameState = 'fishing'; }
  if (clicked && clicked.startsWith('buy_')) {
    const slot = clicked.split('_')[1];
    const equip = EQUIPMENT[slot];
    const nextTier = run.equipTier[slot] + 1;
    if (nextTier < equip.tiers.length) {
      const nextItem = equip.tiers[nextTier];
      if (run.gold >= nextItem.cost && (!nextItem.reqLevel || run.level >= nextItem.reqLevel)) {
        run.gold -= nextItem.cost;
        run.equipTier[slot] = nextTier;
        // Apply stat bonuses additively
        if (slot === 'rod') {
          run.lineMax += nextItem.lineMax;
          run.line = run.lineMax;
          run.hookPower += nextItem.hookPower;
        } else if (slot === 'reel') {
          run.reelSpeed += nextItem.reelSpeed;
        } else if (slot === 'bait') {
          run.biteSpeed += nextItem.biteSpeed;
          run.luckBonus += nextItem.luckBonus;
        }
      }
    }
  }
  if (keys['Escape']) { gameState = 'fishing'; keys['Escape'] = false; }
}

function drawShop(t) {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawText('🛒 장비 상점', canvas.width / 2, 40, { size: 28, align: 'center', color: COLORS.accentLight, font: 'bold' });
  drawText(`💰 보유 골드: ${run.gold.toLocaleString()} | Lv.${run.level}`, canvas.width / 2, 72, { size: 14, align: 'center', color: COLORS.gold });

  // Current equipment info
  const infoY = isMobile ? canvas.height - 120 : canvas.height - 140;
  const infoW = isMobile ? canvas.width - 40 : 360;
  drawPanel(canvas.width / 2 - infoW / 2, infoY, infoW, 100);
  drawText('현재 장비 효과', canvas.width / 2, infoY + 10, { size: 13, align: 'center', color: COLORS.accentLight, font: 'bold' });
  drawText(`줄 내구도: ${Math.floor(run.lineMax)} | 훅 파워: ${run.hookPower.toFixed(2)}`, canvas.width / 2, infoY + 32, { size: 12, align: 'center', color: COLORS.uiText });
  drawText(`릴 속도: ${run.reelSpeed.toFixed(2)}x | 입질 속도: ${run.biteSpeed.toFixed(2)}x`, canvas.width / 2, infoY + 52, { size: 12, align: 'center', color: COLORS.uiText });

  drawButtons(t);
}

let fishingState = 'idle'; // idle, casting, waiting, bite, reeling
let castAnim = 0;
let bobberX = 0, bobberY = 0;
let waitTimer = 0;
let biteTimer = 0;
let currentFish = null;
let fishBubbles = [];

  fishingState = 'idle';

  biteTimer = 0;
  currentFish = null;
  catchMessage = '';

  fishShadows = [];

      x: rand(100, canvas.width - 100),

function updateFishing(dt, t) {
  clearButtons();

  // Event timer
  if (run.activeEvent) {
    run.eventTimer -= dt;
    if (run.eventTimer <= 0) {
      run.activeEvent = null;
      run.tempFight = 1; run.tempRarity = 0; run.tempGold = 1; run.tempBiteSpeed = 1; run.tempDmg = 1;
    }
  }

  // Fish shadows
  for (const s of fishShadows) {
    s.x += s.speed * 60 * dt;
    if (s.x < -50) s.x = canvas.width + 50;
    if (s.x > canvas.width + 50) s.x = -50;
  }

  // Catch message
  if (catchMessageTimer > 0) catchMessageTimer -= dt;

  // Weather particles
  updateWeatherParticles(dt);

  const cx = canvas.width / 2;
  const waterY = canvas.height * 0.50;
  const weather = WEATHER[currentWeatherKey];
  const season = getCurrentSeason();

  switch (fishingState) {
    case 'idle': {
      const btnH = isMobile ? 54 : 45;
      const btnY = canvas.height - (isMobile ? 100 : 80);
      const castW = isMobile ? 140 : 130;
      const sideW = isMobile ? 52 : 56;
      const gap = isMobile ? 6 : 10;

      // Layout: map | shop | CAST | inv
      const totalBtnsW = castW + sideW * 3 + gap * 3;
      const startX = cx - totalBtnsW / 2;

      addButton('map', startX, btnY, sideW, btnH, '🗺️', { color: '#2d3436' });
      addButton('shop', startX + sideW + gap, btnY, sideW, btnH, '🛒', { color: '#2d3436' });
      addButton('cast', startX + sideW * 2 + gap * 2, btnY, castW, btnH, '🎣 캐스팅!', { fontSize: isMobile ? 18 : 16 });
      addButton('inv', startX + sideW * 2 + castW + gap * 3, btnY, sideW, btnH, '🎒', { color: '#2d3436' });

      const clicked = consumeClick();
      if (clicked === 'cast') {
        fishingState = 'casting';
        castAnim = 0;
        bobberX = cx + rand(-150, 150);
        bobberY = waterY + rand(30, 150);
        checkRandomEvent();
      }
      if (clicked === 'map') {
        gameState = village ? 'village' : 'travel_map';
        resetFishing();
      }
      if (clicked === 'shop') gameState = 'shop';
      if (clicked === 'inv') gameState = 'inventory';
      break;
    }

    case 'casting':
      castAnim += dt * 3;
      if (castAnim >= 1) {
        fishingState = 'waiting';
        const biteSpeedTotal = run.biteSpeed * run.tempBiteSpeed * weather.biteSpeedMod * season.biteSpeedMod;
        waitTimer = rand(1, 4) / Math.max(0.1, biteSpeedTotal);
        spawnParticles(bobberX, bobberY, '#4a90d9', 8, 15);
      }
      break;

    case 'waiting':
      waitTimer -= dt;
      if (waitTimer <= 0) {
        fishingState = 'bite';
        biteTimer = 1.5;
        // Check boss spawn
        if (shouldSpawnBoss()) {
          currentFish = generateBossFish(run.location);
        } else {
          currentFish = generateFish(run.location);
        }
        spawnParticles(bobberX, bobberY, RARITY[currentFish.rarity].color, 12, 20);
        vibrate([50]);
      }
      break;

    case 'bite':
      biteTimer -= dt;
      // Player clicks/taps to hook
      const hookW = isMobile ? Math.min(260, canvas.width * 0.6) : 200;
      const hookH = isMobile ? 60 : 50;
      addButton('hook', cx - hookW / 2, canvas.height - (isMobile ? 110 : 80), hookW, hookH, '⚡ 챈다!', { fontSize: isMobile ? 24 : 20, color: '#e74c3c' });
      const hookClicked = consumeClick();
      if (hookClicked === 'hook' || (mouse.clicked && mouse.y < canvas.height - 100)) {
        mouse.clicked = false;
        startMinigame(currentFish);
        fishingState = 'idle';
      }
      if (biteTimer <= 0) {
        fishingState = 'idle';
        catchMessage = '🐟 놓쳤다...';
        catchMessageTimer = 2;
        run.combo = 0;
        currentFish = null;
      }
      break;
  }
}

function drawFishing(t) {
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGrad.addColorStop(0, COLORS.skyGrad1);
  skyGrad.addColorStop(0.4, COLORS.skyGrad2);
  skyGrad.addColorStop(1, run.location.waterColor);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawStars(t);

  const waterY = canvas.height * 0.50;
  drawWater(waterY, canvas.height - waterY, run.location.waterColor, t);

  // Shore line
  ctx.fillStyle = COLORS.sand;
  ctx.beginPath();
  ctx.moveTo(0, waterY);
  for (let x = 0; x <= canvas.width; x += 20) {
    ctx.lineTo(x, waterY + Math.sin(x * 0.02 + t) * 3);
  }
  ctx.lineTo(canvas.width, waterY + 5);
  ctx.lineTo(0, waterY + 5);
  ctx.fill();

  // Fish shadows
  for (const s of fishShadows) {
    if (!run.hasSonar && s.alpha < 0.08) continue;
    ctx.globalAlpha = run.hasSonar ? 0.25 : s.alpha;
    ctx.fillStyle = run.hasSonar ? '#5dade2' : '#1a3a5c';
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, s.size, s.size * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // tail
    const dir = s.speed > 0 ? -1 : 1;
    ctx.beginPath();
    ctx.moveTo(s.x + dir * s.size, s.y);
    ctx.lineTo(s.x + dir * (s.size + s.size * 0.5), s.y - s.size * 0.3);
    ctx.lineTo(s.x + dir * (s.size + s.size * 0.5), s.y + s.size * 0.3);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Bobber & line
  if (fishingState !== 'idle') {
    const rodX = canvas.width / 2 + 20;
    const rodY = waterY - 10;
    const animBobberX = fishingState === 'casting' ? lerp(rodX, bobberX, easeOut(castAnim)) : bobberX;
    const animBobberY = fishingState === 'casting' ? lerp(rodY, bobberY, easeOut(castAnim)) : bobberY;

    // Line
    ctx.strokeStyle = 'rgba(200,200,200,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(rodX, rodY);
    ctx.quadraticCurveTo((rodX + animBobberX) / 2, rodY - 30, animBobberX, animBobberY);
    ctx.stroke();

    // Bobber
    const bobberBounce = fishingState === 'bite' ? Math.sin(t * 15) * 5 : Math.sin(t * 2) * 2;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(animBobberX, animBobberY + bobberBounce, fishingState === 'bite' ? 7 : 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(animBobberX, animBobberY + bobberBounce - 3, 3, 0, Math.PI * 2);
    ctx.fill();

    // Bite indicator
    if (fishingState === 'bite') {
      const pulseAlpha = 0.5 + Math.sin(t * 10) * 0.5;
      ctx.strokeStyle = `rgba(255, 80, 80, ${pulseAlpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(animBobberX, animBobberY + bobberBounce, 15 + Math.sin(t * 8) * 5, 0, Math.PI * 2);
      ctx.stroke();
      drawText('❗', animBobberX, animBobberY - 30 + bobberBounce, { size: 24, align: 'center', baseline: 'middle' });
    }
  }

  // Fisher silhouette
  const fisherX = canvas.width / 2;
  const fisherY = waterY - 15;
  ctx.fillStyle = '#1a1a2e';
  // body
  ctx.fillRect(fisherX - 8, fisherY - 30, 16, 30);
  // head
  ctx.beginPath(); ctx.arc(fisherX, fisherY - 38, 10, 0, Math.PI * 2); ctx.fill();
  // rod
  ctx.strokeStyle = '#4a3520';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(fisherX + 5, fisherY - 20);
  ctx.lineTo(fisherX + 60, fisherY - 50);
  ctx.stroke();

  drawParticles();

  // Weather effects on top
  drawWeatherEffects(t);

  // HUD
  const weather = WEATHER[currentWeatherKey];
  const season = getCurrentSeason();
  const hudW = isMobile ? Math.min(210, canvas.width - 20) : 230;
  const hudFs = isMobile ? 11 : 13;
  const hudH = isMobile ? 130 : 145;
  drawPanel(10, 10, hudW, hudH);
  const clsIco = run.charClass ? run.charClass.icon : '';
  drawText(`${clsIco} ${run.location.name}`, 18, 16, { size: isMobile ? 13 : 15, color: COLORS.accentLight, font: 'bold' });
  drawText(`Lv.${run.level}`, 18, 36, { size: hudFs, color: COLORS.uiText });
  drawBar(50, 36, hudW - 60, 13, run.xp, run.xpToNext, COLORS.xp, COLORS.xpBg, `${run.xp}/${run.xpToNext}`);
  drawText('❤️', 18, 56, { size: hudFs });
  drawBar(42, 56, hudW - 52, 13, run.hp, run.maxHp, COLORS.hp, COLORS.hpBg, `${Math.ceil(run.hp)}/${run.maxHp}`);
  drawText(`💰 ${run.gold.toLocaleString()}`, 18, 76, { size: hudFs, color: COLORS.gold });
  drawText(`📊 ${run.score.toLocaleString()}`, 18 + hudW / 2, 76, { size: hudFs, color: COLORS.uiTextDim });
  if (run.combo > 1) drawText(`🔥 x${run.combo}`, 18, 94, { size: hudFs, color: '#e67e22' });
  drawText(`🐟 ${run.fishCount}`, 18 + hudW / 2, 94, { size: hudFs, color: COLORS.uiTextDim });
  // Weather + Season + Energy display
  drawText(`${weather.icon} ${weather.name}`, 18, 112, { size: hudFs, color: COLORS.uiTextDim });
  drawText(`${season.icon} ${season.name}`, 18 + hudW / 2, 112, { size: hudFs, color: COLORS.uiTextDim });
  if (village) {
    drawText(`⚡${village.energy}`, 18, 128, { size: hudFs, color: village.energy < 20 ? '#e74c3c' : '#f39c12' });
    drawText(`🎒${village.inventory.length}/${getInvMax()}`, 18 + hudW / 2, 128, { size: hudFs, color: village.inventory.length >= getInvMax() ? '#e74c3c' : COLORS.uiTextDim });
  }

  // Active event
  if (run.activeEvent) {
    const ew = 280;
    drawPanel(canvas.width - ew - 10, 10, ew, 50, { fill: '#2d1b4e', border: '#6c5ce7' });
    drawText(run.activeEvent.name, canvas.width - ew, 18, { size: 14, color: '#a29bfe', font: 'bold' });
    drawText(`${Math.ceil(run.eventTimer)}초 남음`, canvas.width - ew, 38, { size: 11, color: COLORS.uiTextDim });
  }

  // Catch message
  if (catchMessageTimer > 0) {
    const msgAlpha = Math.min(1, catchMessageTimer);
    ctx.globalAlpha = msgAlpha;
    drawText(catchMessage, canvas.width / 2, canvas.height * 0.35, { size: 22, align: 'center', baseline: 'middle', color: '#fff', shadow: true, font: 'bold' });
    ctx.globalAlpha = 1;
  }

  drawButtons(t);
}

// ─── SCENE: MINIGAME ───
function updateMinigame(dt, t) {
  const mg = run.mg;
  if (!mg) return;
  clearButtons();

  if (mg.result) {
    mg.resultTimer -= dt;
    if (mg.resultTimer <= 0) {
      if (mg.result === 'caught') {
        // Register catch
        const fish = mg.fish;
        run.fishCount++;
        run.seasonCounter++;
        run.gold += fish.goldValue;
        run.score += Math.floor(fish.scoreValue * (1 + run.combo * run.comboBonus));
        run.xp += Math.floor(5 + fish.actualFight * 3) * (fish.isBoss ? BOSS_CONFIG.xpMulti : 1);
        run.combo++;
        run.hp = Math.min(run.maxHp, run.hp + run.healOnCatch);
        run.fishCaught.push({ name: fish.name, rarity: fish.rarity, size: fish.size, gold: fish.goldValue, isBoss: !!fish.isBoss });

        // Vibration based on rarity
        const r = fish.rarity;
        if (r === 'legendary' || r === 'mythic') vibrate([60,30,80,30,120,30,200]);
        else if (r === 'rare' || r === 'epic') vibrate([50,30,80]);
        else vibrate([80]);

        // Codex
        if (!unlockedFish.includes(fish.name)) {
          unlockedFish.push(fish.name);
          localStorage.setItem('deepcast_codex', JSON.stringify(unlockedFish));
        }

        // Village inventory
        if (village) {
          addToInventory(fish);
          village.totalFishCaught++;
          // Energy cost
          village.energy = Math.max(0, village.energy - 3);
          // Check NPC quests
          for (const q of village.questsActive) {
            if (q.fish === fish.name) {
              q.progress = (q.progress || 0) + 1;
              if (q.progress >= q.count) {
                village.gold += q.reward;
                const npc = NPCS.find(n => n.quest.id === q.id);
                if (npc) village.npcFriendship[npc.id] = (village.npcFriendship[npc.id]||0) + q.friendReward;
                village.questsCompleted.push(q.id);
                village.questsActive = village.questsActive.filter(a => a.id !== q.id);
                catchMessage += ` | 📋 퀘스트 완료!`;
              }
            }
          }
          saveVillage();
        }

        // Double catch
        if (Math.random() < run.doubleCatchChance) {
          run.gold += Math.floor(fish.goldValue * 0.5);
          run.score += Math.floor(fish.scoreValue * 0.5);
          catchMessage = '🥅 더블 캐치! 보너스 획득!';
        } else {
          const bossTag = fish.isBoss ? '👹 BOSS ' : '';
          catchMessage = `✅ ${bossTag}${fish.rarityData.name} ${fish.name} (${fish.size}cm) 획득! +${fish.goldValue}G`;
        }
        catchMessageTimer = 3;

        if (!checkLevelUp()) gameState = 'fishing';
      } else {
        // escaped or broken
        run.combo = 0;
        const stormDmgMod = (currentWeatherKey === 'storm' && run.stormImmune) ? 0 : 1;
        const dmg = mg.fish.actualFight * 3 * run.tempDmg * (1 - run.damageReduce) * stormDmgMod;
        if (mg.result === 'broken') {
          vibrate([300]);
          catchMessage = `💥 줄이 끊어졌다! -${Math.ceil(dmg)} HP`;
        } else {
          catchMessage = `🐟 놓쳤다... -${Math.ceil(dmg)} HP`;
        }
        catchMessageTimer = 2.5;
        run.hp -= dmg;

        if (run.hp <= 0) {
          run.hp = 0;
          endRun();
        } else {
          gameState = 'fishing';
        }
      }
      run.mg = null;
      run.bossActive = false;
      generateFishShadows();
    }
    return;
  }

  // Timer
  mg.timer -= dt;
  if (mg.timer <= 0) {
    mg.result = 'escaped';
    mg.resultTimer = 1.5;
    return;
  }

  // Catch zone movement (fish AI)
  mg.catchZoneY += mg.catchZoneVel * 60 * dt;
  if (mg.catchZoneY < 0 || mg.catchZoneY > mg.barHeight - mg.catchZoneSize) {
    mg.catchZoneVel *= -1;
    mg.catchZoneY = clamp(mg.catchZoneY, 0, mg.barHeight - mg.catchZoneSize);
  }
  // Random direction change
  if (Math.random() < 0.02 * mg.fish.speed) mg.catchZoneVel *= -1;
  if (Math.random() < 0.01) mg.catchZoneVel += rand(-1, 1);
  mg.catchZoneVel = clamp(mg.catchZoneVel, -5, 5);

  // Adrenaline check
  let reelSpeedMod = 1;
  if (run.hasAdrenaline && run.hp / run.maxHp <= 0.3) {
    reelSpeedMod = 1.6;
  }

  // Marker (player control)
  if (mouse.down || keys['Space']) {
    mg.markerVel -= (8 + run.reelSpeed * reelSpeedMod * 2) * dt * 60;
  }
  mg.markerVel += 5 * dt * 60; // gravity
  mg.markerVel *= 0.92; // damping
  mg.markerY += mg.markerVel * dt * 60 * 0.1;
  mg.markerY = clamp(mg.markerY, 0, mg.barHeight);

  // Check if marker is in catch zone
  const inZone = mg.markerY >= mg.catchZoneY && mg.markerY <= mg.catchZoneY + mg.catchZoneSize;
  if (inZone) {
    let gain = mg.progressGain * run.hookPower * dt * 60;
    // Critical hook check
    if (run.critChance > 0 && Math.random() < run.critChance * dt * 2) {
      gain *= 2;
    }
    mg.progress += gain;
    mg.tension = Math.max(0, mg.tension - 0.3 * dt * 60);
  } else {
    mg.progress -= mg.progressDecay * dt * 60;
    mg.tension += (0.2 + mg.fish.actualFight * 0.05) * dt * 60;
  }

  mg.progress = clamp(mg.progress, 0, 100);
  mg.tension = clamp(mg.tension, 0, mg.maxTension);

  // Win/Lose
  if (mg.progress >= 100) {
    mg.result = 'caught';
    mg.resultTimer = 1.5;
    spawnParticles(canvas.width / 2, canvas.height / 2, mg.fish.rarityData.color, 30, 60);
  }
  if (mg.tension >= mg.maxTension) {
    mg.result = 'broken';
    mg.resultTimer = 1.5;
  }

  // Splash
  mg.splashTimer -= dt;
  if (mg.splashTimer <= 0 && !inZone) {
    mg.splashTimer = rand(0.3, 0.8);
    spawnParticles(mg.fishX + rand(-20, 20), mg.fishY + rand(-10, 10), '#4a90d9', 3, 8);
  }
}

function drawMinigame(t) {
  const mg = run.mg;
  if (!mg) return;

  // Dim background
  ctx.fillStyle = 'rgba(5, 5, 20, 0.85)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Boss red vignette
  if (mg.isBoss) {
    const vigGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height * 0.2, canvas.width/2, canvas.height/2, canvas.height * 0.8);
    vigGrad.addColorStop(0, 'rgba(200,0,0,0)');
    vigGrad.addColorStop(1, `rgba(200,0,0,${0.15 + Math.sin(t * 3) * 0.05})`);
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Fish info panel
  const infoPanelW = isMobile ? Math.min(320, canvas.width - 40) : 400;
  drawPanel(cx - infoPanelW / 2, 30, infoPanelW, mg.isBoss ? 65 : 50);
  const bossLabel = mg.isBoss ? '⚠️ BOSS ' : '';
  drawText(`${bossLabel}${mg.fish.rarityData.name} ${mg.fish.name}`, cx, 42, { size: isMobile ? 15 : 18, align: 'center', color: mg.isBoss ? '#e74c3c' : mg.fish.rarityData.color, font: 'bold' });
  drawText(`${mg.fish.size}cm | 전투력: ${mg.fish.actualFight.toFixed(1)}`, cx, 62, { size: isMobile ? 11 : 12, align: 'center', color: COLORS.uiTextDim });
  if (mg.isBoss) {
    drawText('보스 물고기!', cx, 80, { size: isMobile ? 10 : 11, align: 'center', color: '#e74c3c' });
  }

  // Reel bar (left side)
  const barX = isMobile ? 20 : cx - 180;
  const barY = cy - (isMobile ? 100 : 150);
  const barW = isMobile ? 35 : 40;
  const barH = isMobile ? Math.min(250, canvas.height * 0.35) : mg.barHeight;

  // Bar background
  drawPanel(barX - 5, barY - 5, barW + 10, barH + 10, { fill: '#0a0a1a', border: '#2a2a4e' });

  // Catch zone (scale positions to drawn barH)
  const scaleY = barH / mg.barHeight;
  ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
  ctx.fillRect(barX, barY + mg.catchZoneY * scaleY, barW, mg.catchZoneSize * scaleY);
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY + mg.catchZoneY * scaleY, barW, mg.catchZoneSize * scaleY);

  // Marker
  const inZone = mg.markerY >= mg.catchZoneY && mg.markerY <= mg.catchZoneY + mg.catchZoneSize;
  ctx.fillStyle = inZone ? '#2ecc71' : '#e74c3c';
  ctx.beginPath();
  ctx.arc(barX + barW / 2, barY + mg.markerY * scaleY, isMobile ? 10 : 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Progress bar (bottom)
  const progBarW = isMobile ? Math.min(260, canvas.width - 60) : 260;
  const progX = cx - progBarW / 2;
  const progY = isMobile ? canvas.height - 130 : cy + 180;
  drawText('포획 진행도', progX, progY - 15, { size: isMobile ? 11 : 12, color: COLORS.uiTextDim });
  drawBar(progX, progY, progBarW, 20, mg.progress, 100, '#2ecc71', '#153d20', `${Math.floor(mg.progress)}%`);

  // Tension bar
  const tensY = progY + 35;
  drawText('줄 장력', progX, tensY - 15, { size: isMobile ? 11 : 12, color: COLORS.uiTextDim });
  const tensionColor = mg.tension / mg.maxTension > 0.7 ? '#e74c3c' : '#f39c12';
  drawBar(progX, tensY, progBarW, 20, mg.tension, mg.maxTension, tensionColor, '#3d2515', `${Math.floor(mg.tension)}/${Math.floor(mg.maxTension)}`);

  // Timer
  const timeColor = mg.timer < 5 ? '#e74c3c' : COLORS.uiText;
  drawText(`⏱️ ${mg.timer.toFixed(1)}s`, isMobile ? cx : cx + 100, isMobile ? (mg.isBoss ? 100 : 90) : cy - 150, { size: isMobile ? 18 : 16, color: timeColor, align: isMobile ? 'center' : 'left' });

  // Fish visual (right side on desktop, center on mobile)
  const fishVizX = isMobile ? cx : cx + 60;
  const fishVizY = isMobile ? cy - 20 : cy - 30;
  const fishPanelSize = isMobile ? 140 : 200;
  drawPanel(fishVizX - fishPanelSize / 2, fishVizY - fishPanelSize / 2, fishPanelSize, fishPanelSize, { fill: run.location.waterColor, border: mg.isBoss ? '#e74c3c' : mg.fish.rarityData.color });

  // Animated fish
  const fishBounce = Math.sin(t * 4) * 10;
  const fishSize = clamp(mg.fish.size * 0.3, 15, isMobile ? 40 : 60);
  ctx.fillStyle = mg.fish.rarityData.color;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.ellipse(fishVizX, fishVizY + fishBounce, fishSize, fishSize * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(fishVizX + fishSize * 0.5, fishVizY + fishBounce - fishSize * 0.1, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(fishVizX + fishSize * 0.5 + 1, fishVizY + fishBounce - fishSize * 0.1, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // tail
  ctx.fillStyle = mg.fish.rarityData.color;
  ctx.beginPath();
  ctx.moveTo(fishVizX - fishSize, fishVizY + fishBounce);
  ctx.lineTo(fishVizX - fishSize - fishSize * 0.5, fishVizY + fishBounce - fishSize * 0.35);
  ctx.lineTo(fishVizX - fishSize - fishSize * 0.5, fishVizY + fishBounce + fishSize * 0.35);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Boss glow effect
  if (mg.isBoss) {
    ctx.globalAlpha = 0.2 + Math.sin(t * 5) * 0.1;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(fishVizX, fishVizY + fishBounce, fishSize + 10, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Adrenaline indicator
  if (run.hasAdrenaline && run.hp / run.maxHp <= 0.3) {
    drawText('💉 아드레날린 활성!', cx, isMobile ? canvas.height - 165 : cy + 155, { size: 12, align: 'center', color: '#e74c3c', font: 'bold' });
  }

  // Instructions
  const instrText = isMobile ? '👆 화면을 누르세요: 릴 감기' : '🖱️ 클릭/스페이스: 릴 감기';
  drawText(instrText, cx, isMobile ? canvas.height - 60 : cy + 240, { size: 13, align: 'center', color: COLORS.uiTextDim });

  // Result overlay
  if (mg.result) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const msg = mg.result === 'caught' ? '🎉 잡았다!' : mg.result === 'broken' ? '💥 줄이 끊어졌다!' : '🐟 도망갔다...';
    const col = mg.result === 'caught' ? '#2ecc71' : '#e74c3c';
    drawText(msg, cx, cy, { size: 36, align: 'center', baseline: 'middle', color: col, font: 'bold', shadow: true });

    }
  }

  drawParticles();
}

// ─── GAME OVER ───
function endRun() {
  if (run.score > bestScore) {
    bestScore = run.score;
    localStorage.setItem('deepcast_best', bestScore);
  }
  gameState = 'game_over';
}

function updateGameOver(dt) {
  clearButtons();
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const goBtnW = isMobile ? Math.min(260, canvas.width * 0.65) : 240;
  if (village) {
    addButton('to_village', cx - goBtnW / 2, cy + 140, goBtnW, isMobile ? 56 : 50, '🏘️ 마을로 돌아가기', { fontSize: isMobile ? 18 : 16 });
  } else {
    addButton('retry', cx - goBtnW / 2, cy + 140, goBtnW, isMobile ? 56 : 50, '🔄 다시 도전', { fontSize: isMobile ? 20 : 18 });
  }
  addButton('title', cx - goBtnW / 2, cy + (isMobile ? 210 : 200), goBtnW, isMobile ? 46 : 40, '🏠 타이틀로', { color: '#2d3436' });

  const clicked = consumeClick();
  if (clicked === 'retry') newRun();
  if (clicked === 'to_village' && village) {
    advanceTime(); // time passes when you faint
    run.hp = Math.floor(run.maxHp * 0.5); // wake up with half HP
    gameState = 'village';
  }
  if (clicked === 'title') gameState = 'title';
}

function drawGameOver(t) {
  ctx.fillStyle = 'rgba(5, 5, 15, 0.95)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  drawText('📊 런 결과', cx, cy - 100, { size: 20, align: 'center', color: COLORS.accentLight, font: 'bold' });

  const bossCount = run.fishCaught.filter(f => f.isBoss).length;
  const stats = [
    [`점수: ${run.score.toLocaleString()}`, run.score >= bestScore ? COLORS.gold : COLORS.uiText],
    [`잡은 물고기: ${run.fishCount}마리${bossCount > 0 ? ' (보스 ' + bossCount + ')' : ''}`, COLORS.uiText],
    [`도달 레벨: ${run.level}`, COLORS.uiText],
    [`획득 골드: ${run.gold.toLocaleString()}`, COLORS.gold],

// ─── BOTTOM NAV BAR ───
const NAV_ITEMS = [
  { id: 'nav_village', icon: '🏘️', label: '마을', state: 'village' },
  { id: 'nav_fish', icon: '🎣', label: '낚시', state: 'travel_map' },
  { id: 'nav_inv', icon: '🎒', label: '소지품', state: 'village_inv' },
  { id: 'nav_codex', icon: '📖', label: '도감', state: 'codex' },
];

function drawBottomNav(t) {
  const navH = isMobile ? 56 : 50;
  const navY = canvas.height - navH;
  ctx.fillStyle = 'rgba(10,10,26,0.95)';
  ctx.fillRect(0, navY, canvas.width, navH);
  ctx.strokeStyle = COLORS.uiBorder;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, navY); ctx.lineTo(canvas.width, navY); ctx.stroke();

  const itemW = canvas.width / NAV_ITEMS.length;
  for (let i = 0; i < NAV_ITEMS.length; i++) {
    const item = NAV_ITEMS[i];
    const x = i * itemW + itemW / 2;
    const isActive = gameState === item.state || (item.state === 'village' && gameState.startsWith('village'));
    ctx.fillStyle = isActive ? COLORS.accentLight : COLORS.uiTextDim;
    drawText(item.icon, x, navY + 10, { size: 18, align: 'center' });
    drawText(item.label, x, navY + 32, { size: 9, align: 'center', color: isActive ? COLORS.accentLight : COLORS.uiTextDim });
  }
}

function handleNavClick() {
  if (!village) return null;
  const navH = isMobile ? 56 : 50;
  const navY = canvas.height - navH;
  if (mouse.y < navY) return null;
  const itemW = canvas.width / NAV_ITEMS.length;
  const idx = Math.floor(mouse.x / itemW);
  if (idx >= 0 && idx < NAV_ITEMS.length) return NAV_ITEMS[idx].state;
  return null;
}

// ─── SCENE: VILLAGE HUB ───
function updateVillage(dt, t) {
  clearButtons();
  const cx = canvas.width / 2;
  const navH = isMobile ? 56 : 50;

  // Building buttons
  for (const b of BUILDINGS) {
    const bx = b.x * canvas.width;
    const by = b.y * (canvas.height - navH - 60) + 60;
    const bSize = isMobile ? 44 : 50;
    addButton('bld_' + b.id, bx - bSize/2, by - bSize/2, bSize, bSize, b.icon, { fontSize: 22 });
  }

  // NPC buttons
  for (const npc of NPCS) {
    const bld = BUILDINGS.find(b => b.id === npc.location);
    if (!bld) continue;
    const nx = bld.x * canvas.width + (isMobile ? 35 : 45);
    const ny = bld.y * (canvas.height - navH - 60) + 60 - 10;
    addButton('npc_' + npc.id, nx - 20, ny - 20, 40, 40, '', { color: 'transparent' });
  }

  // Action buttons
  addButton('v_sleep', cx - 60, canvas.height - navH - 45, 120, 34, '💤 휴식', { fontSize: 13, color: '#2d3436' });

  const clicked = consumeClick();
  if (clicked) {
    const nav = handleNavClick();
    if (nav) { gameState = nav; return; }
    if (clicked.startsWith('bld_')) {
      const bId = clicked.split('_')[1];
      if (bId === 'market') { gameState = 'fish_market'; return; }
      if (bId === 'dock' || bId === 'home' || bId === 'shrine') {
        villageSubScreen = bId;
        gameState = 'building_upgrade';
        return;
      }
    }
    if (clicked.startsWith('npc_')) {
      const npcId = clicked.split('_')[1];
      activeNpc = NPCS.find(n => n.id === npcId);
      dialogLine = 0;
      gameState = 'npc_dialog';
      return;
    }
    if (clicked === 'v_sleep') {
      advanceTime();
      spawnParticles(cx, canvas.height / 2, '#a29bfe', 15, 30);
    }
  }
}

function drawVillage(t) {
  const navH = isMobile ? 56 : 50;
  const cx = canvas.width / 2;

  // Sky gradient based on time of day
  const timeColors = [['#ff7f50','#87ceeb'],['#87ceeb','#5dade2'],['#ff6347','#1a1040'],['#0a0e2a','#050510']];
  const tc = timeColors[village.timeOfDay] || timeColors[0];
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
  skyGrad.addColorStop(0, tc[0]);
  skyGrad.addColorStop(1, tc[1]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (village.timeOfDay >= 2) drawStars(t);

  // Ground
  ctx.fillStyle = '#2d5016';
  ctx.fillRect(0, canvas.height * 0.55, canvas.width, canvas.height * 0.45);
  // Path
  ctx.fillStyle = '#8B7355';
  ctx.fillRect(cx - 20, canvas.height * 0.55, 40, canvas.height * 0.3);
  // Water edge
  drawWater(canvas.height * 0.7, canvas.height * 0.3 - navH, '#0d2b4e', t);

  // Draw buildings
  for (const b of BUILDINGS) {
    const bx = b.x * canvas.width;
    const by = b.y * (canvas.height - navH - 60) + 60;
    const lvl = village.buildingLevels[b.id];
    // Building body
    ctx.fillStyle = lvl >= 2 ? '#5D4037' : lvl >= 1 ? '#6D4C41' : '#795548';
    const bw = 40 + lvl * 10;
    const bh = 30 + lvl * 8;
    ctx.fillRect(bx - bw/2, by - bh + 10, bw, bh);
    // Roof
    ctx.fillStyle = lvl >= 2 ? '#c0392b' : lvl >= 1 ? '#d35400' : '#8D6E63';
    ctx.beginPath();
    ctx.moveTo(bx - bw/2 - 5, by - bh + 12);
    ctx.lineTo(bx, by - bh - 10 - lvl * 5);
    ctx.lineTo(bx + bw/2 + 5, by - bh + 12);
    ctx.fill();
    // Label
    drawText(b.name, bx, by + 16, { size: 9, align: 'center', color: COLORS.uiText });
    drawText(`Lv.${lvl+1}`, bx, by + 28, { size: 8, align: 'center', color: COLORS.uiTextDim });
  }

  // Draw NPCs near their buildings
  for (const npc of NPCS) {
    const bld = BUILDINGS.find(b => b.id === npc.location);
    if (!bld) continue;
    const nx = bld.x * canvas.width + (isMobile ? 35 : 45);
    const ny = bld.y * (canvas.height - navH - 60) + 60 - 10;
    ctx.save();
    npc.draw(nx, ny, 22);
    ctx.restore();
    // Friendship indicator
    const fr = village.npcFriendship[npc.id] || 0;
    const hearts = fr >= 50 ? '💗💗💗' : fr >= 20 ? '💗💗' : fr > 0 ? '💗' : '';
    if (hearts) drawText(hearts, nx, ny - 30, { size: 8, align: 'center' });
  }

  // HUD top bar
  drawPanel(0, 0, canvas.width, 52, { radius: 0, alpha: 0.9 });
  const fs = isMobile ? 10 : 12;
  const seasonData = SEASONS[getSeasonKey()];
  drawText(`${seasonData.icon} ${seasonData.name} ${village.day}일차`, 10, 8, { size: fs, color: COLORS.accentLight, font: 'bold' });
  drawText(`${getTimeIcon()} ${getTimeName()}`, 10, 26, { size: fs, color: COLORS.uiText });
  const w = WEATHER[currentWeatherKey];
  drawText(`${w.icon} ${w.name}`, 10, 40, { size: fs - 1, color: COLORS.uiTextDim });

  drawText(`💰 ${village.gold}`, cx - 30, 8, { size: fs, color: COLORS.gold });
  drawText(`⚡ ${village.energy}/${getEnergyMax()}`, cx - 30, 26, { size: fs, color: '#f39c12' });
  drawText(`🎒 ${village.inventory.length}/${getInvMax()}`, cx + 50, 8, { size: fs, color: COLORS.uiText });
  if (run) drawText(`Lv.${run.level}`, cx + 50, 26, { size: fs, color: COLORS.xp });

  drawParticles();
  drawButtons(t);
  drawBottomNav(t);
}

// ─── SCENE: NPC DIALOG ───
function updateNpcDialog(dt) {
  clearButtons();
  if (!activeNpc) { gameState = 'village'; return; }

  const cx = canvas.width / 2;
  addButton('npc_close', cx + 80, canvas.height / 2 - 130, 30, 30, '✕', { fontSize: 14, color: '#555' });
  addButton('npc_gift', cx - 130, canvas.height / 2 + 80, 120, 36, '🎁 선물하기', { color: '#27ae60' });
  addButton('npc_quest', cx + 10, canvas.height / 2 + 80, 120, 36, '📋 퀘스트', { color: '#2980b9' });

  const clicked = consumeClick();
  if (clicked === 'npc_close' || clicked === '__none__') { gameState = 'village'; return; }
  if (clicked === 'npc_gift') {
    if (village.npcGifted[activeNpc.id]) return; // already gifted today
    if (village.inventory.length === 0) return;
    // Gift the first fish
    const fish = village.inventory[0];
    const friendGain = activeNpc.gifts[fish.rarity] || 1;
    village.npcFriendship[activeNpc.id] = (village.npcFriendship[activeNpc.id] || 0) + friendGain;
    village.npcGifted[activeNpc.id] = true;
    village.inventory.splice(0, 1);
    spawnParticles(cx, canvas.height / 2, '#e74c3c', 10, 20);
    saveVillage();
  }
  if (clicked === 'npc_quest') {
    const q = activeNpc.quest;
    const alreadyActive = village.questsActive.find(a => a.id === q.id);
    const alreadyDone = village.questsCompleted.includes(q.id);
    if (!alreadyActive && !alreadyDone) {
      village.questsActive.push({ ...q, progress: 0 });
      saveVillage();
    }
  }
}

function drawNpcDialog(t) {
  ctx.fillStyle = 'rgba(5,5,20,0.85)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!activeNpc) return;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const panelW = isMobile ? canvas.width - 40 : 400;

  drawPanel(cx - panelW/2, cy - 140, panelW, 280);

  // NPC portrait
  ctx.save();
  activeNpc.draw(cx, cy - 80, 35);
  ctx.restore();

  drawText(`${activeNpc.icon} ${activeNpc.name}`, cx, cy - 35, { size: 16, align: 'center', color: activeNpc.color, font: 'bold' });
  drawText(activeNpc.role, cx, cy - 15, { size: 11, align: 'center', color: COLORS.uiTextDim });

  // Friendship
  const fr = village.npcFriendship[activeNpc.id] || 0;
  drawText(`호감도: ${'❤️'.repeat(Math.min(5, Math.floor(fr/10)))}${'🤍'.repeat(Math.max(0, 5 - Math.floor(fr/10)))} (${fr})`, cx, cy + 5, { size: 11, align: 'center', color: '#e74c3c' });

  // Dialog
  let dialog = activeNpc.greeting;
  const dlgs = activeNpc.dialogs.filter(d => fr >= d.friendship);
  if (dlgs.length > 0) {
    const best = dlgs[dlgs.length - 1];
    dialog = best.lines[Math.floor(t) % best.lines.length];
  }
  drawText(`"${dialog}"`, cx, cy + 30, { size: isMobile ? 12 : 13, align: 'center', color: COLORS.uiText });

  // Quest status
  const q = activeNpc.quest;
  const active = village.questsActive.find(a => a.id === q.id);
  const done = village.questsCompleted.includes(q.id);
  if (done) {
    drawText('✅ 퀘스트 완료!', cx, cy + 55, { size: 11, align: 'center', color: COLORS.xp });
  } else if (active) {
    drawText(`📋 ${q.desc} (${active.progress || 0}/${q.count})`, cx, cy + 55, { size: 11, align: 'center', color: COLORS.gold });
  } else {
    drawText(`📋 ${q.desc} — 보상: ${q.reward}G`, cx, cy + 55, { size: 11, align: 'center', color: COLORS.uiTextDim });
  }

  drawButtons(t);
}

  if (village.inventory.length > 0) {
    addButton('sell_all', cx - 70, 75, 140, 34, '💰 전부 판매', { color: '#e67e22' });
    const maxShow = Math.min(village.inventory.length, 8);
    for (let i = 0; i < maxShow; i++) {
      const f = village.inventory[i];
      const sellPrice = Math.floor(f.goldValue * getSellMulti());
      addButton('sell_' + i, cx - 140, 125 + i * 42, 280, 38, `${RARITY[f.rarity].name} ${f.name} — ${sellPrice}G`, { fontSize: 12, color: RARITY[f.rarity].color });
    }
  }

  const clicked = consumeClick();
  if (clicked === 'market_back') { gameState = 'village'; return; }
  if (clicked === 'sell_all') {
    const total = sellAllFish();
    spawnParticles(cx, canvas.height / 2, COLORS.gold, 20, 30);
  }
  if (clicked && clicked.startsWith('sell_')) {
    const idx = parseInt(clicked.split('_')[1]);
    sellFish(idx);
    spawnParticles(cx, 125 + idx * 42, COLORS.gold, 8, 15);
  }
}

function drawFishMarket(t) {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;

  drawText('🏪 어시장', cx, 20, { size: 24, align: 'center', color: COLORS.accentLight, font: 'bold' });
  drawText(`판매 보너스: x${getSellMulti().toFixed(1)} | 💰 ${village.gold}G`, cx, 52, { size: 12, align: 'center', color: COLORS.gold });

  if (village.inventory.length === 0) {
    drawText('소지품이 비어있습니다', cx, 200, { size: 14, align: 'center', color: COLORS.uiTextDim });
  }

  drawParticles();
  drawButtons(t);
  drawBottomNav(t);
}

// ─── SCENE: BUILDING UPGRADE ───
function updateBuildingUpgrade(dt) {
  clearButtons();
  addButton('bld_back', 30, 30, 120, 36, '← 마을로', { color: '#2d3436' });

  const bld = BUILDINGS.find(b => b.id === villageSubScreen);
  if (!bld) { gameState = 'village'; return; }

  const cx = canvas.width / 2;
  const currentLvl = village.buildingLevels[bld.id];
  const nextLvl = currentLvl + 1;
  if (nextLvl < bld.levels.length) {
    const next = bld.levels[nextLvl];
    const canAfford = village.gold >= next.cost;
    addButton('bld_upgrade', cx - 80, 250, 160, 42, `⬆️ 업그레이드 (${next.cost}G)`, { disabled: !canAfford, color: canAfford ? '#27ae60' : '#555' });
  }

  const clicked = consumeClick();
  if (clicked === 'bld_back') { gameState = 'village'; return; }
  if (clicked === 'bld_upgrade') {
    const next = bld.levels[nextLvl];
    if (village.gold >= next.cost) {
      village.gold -= next.cost;
      village.buildingLevels[bld.id] = nextLvl;
      village.maxEnergy = getEnergyMax();
      village.inventoryMax = getInvMax();
      spawnParticles(cx, 200, '#f1c40f', 20, 40);
      saveVillage();
    }
  }
}

function drawBuildingUpgrade(t) {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const bld = BUILDINGS.find(b => b.id === villageSubScreen);
  if (!bld) return;

  const currentLvl = village.buildingLevels[bld.id];
  const current = bld.levels[currentLvl];

  drawText(`${bld.icon} ${bld.name}`, cx, 40, { size: 26, align: 'center', color: COLORS.accentLight, font: 'bold' });
  drawText(`현재: ${current.name} (Lv.${currentLvl + 1})`, cx, 80, { size: 14, align: 'center', color: COLORS.uiText });
  drawText(current.desc, cx, 105, { size: 12, align: 'center', color: COLORS.uiTextDim });

  const nextLvl = currentLvl + 1;
  if (nextLvl < bld.levels.length) {
    const next = bld.levels[nextLvl];
    drawPanel(cx - 140, 140, 280, 90);
    drawText(`다음 단계: ${next.name}`, cx, 155, { size: 14, align: 'center', color: COLORS.gold, font: 'bold' });
    drawText(next.desc, cx, 180, { size: 12, align: 'center', color: COLORS.uiText });
    drawText(`비용: ${next.cost}G | 보유: ${village.gold}G`, cx, 205, { size: 11, align: 'center', color: village.gold >= next.cost ? COLORS.xp : COLORS.hp });
  } else {
    drawText('✅ 최대 레벨 달성!', cx, 160, { size: 16, align: 'center', color: COLORS.xp });
  }

  drawParticles();
  drawButtons(t);
  drawBottomNav(t);
}

// ─── SCENE: VILLAGE INVENTORY ───
function updateVillageInv(dt) {
  clearButtons();
  addButton('vinv_back', 30, 30, 100, 36, '← 마을', { color: '#2d3436' });
  const clicked = consumeClick();
  if (clicked === 'vinv_back') { gameState = 'village'; return; }
  const nav = handleNavClick();
  if (nav && mouse.clicked) { mouse.clicked = false; gameState = nav; }
}

function drawVillageInv(t) {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const navH = isMobile ? 56 : 50;

  drawText('🎒 소지품', cx, 25, { size: 24, align: 'center', color: COLORS.accentLight, font: 'bold' });
  drawText(`${village.inventory.length}/${getInvMax()}칸 사용중 | 💰 ${village.gold}G`, cx, 55, { size: 12, align: 'center', color: COLORS.uiTextDim });

  if (village.inventory.length === 0) {
    drawText('소지품이 비어있습니다', cx, 150, { size: 14, align: 'center', color: COLORS.uiTextDim });
    drawText('낚시를 하여 물고기를 잡으세요!', cx, 175, { size: 12, align: 'center', color: COLORS.uiTextDim });
  } else {
    let y = 85;
    const maxShow = Math.min(village.inventory.length, Math.floor((canvas.height - navH - 100) / 28));
    for (let i = 0; i < maxShow; i++) {
      const f = village.inventory[i];
      const rd = RARITY[f.rarity];
      drawText(`${rd.name}`, 30, y, { size: 11, color: rd.color });
      drawText(`${f.name} (${f.size}cm)`, 80, y, { size: 11, color: COLORS.uiText });
      drawText(`${f.goldValue}G`, canvas.width - 40, y, { size: 11, color: COLORS.gold, align: 'right' });
      y += 28;
    }
    if (village.inventory.length > maxShow) {
      drawText(`... 외 ${village.inventory.length - maxShow}마리`, 30, y, { size: 11, color: COLORS.uiTextDim });
    }
  }

  // Show active quests
  if (village.questsActive.length > 0) {
    drawText('📋 진행 중인 퀘스트', cx, canvas.height - navH - 90, { size: 13, align: 'center', color: COLORS.gold, font: 'bold' });
    let qy = canvas.height - navH - 70;
    for (const q of village.questsActive) {
      drawText(`• ${q.desc} (${q.progress || 0}/${q.count})`, cx, qy, { size: 11, align: 'center', color: COLORS.uiText });
      qy += 20;
    }
  }

  drawButtons(t);
  drawBottomNav(t);
}

// ─── INTEGRATE VILLAGE INTO FISHING ───
// Override the fish catch to add to village inventory
const _origNavigateTo = typeof navigateTo !== 'undefined' ? null : null; // placeholder

// ─── MAIN LOOP ───
let lastTime = 0;
let gameTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  gameTime += dt;

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Update & Draw
  switch (gameState) {
    case 'title':
      updateTitle(dt, gameTime);
      drawTitle(gameTime);
      break;
    case 'intro':
      updateIntro(dt, gameTime);
      drawIntro(gameTime);
      break;
    case 'char_select':
      updateCharSelect(dt, gameTime);
      drawCharSelect(gameTime);
      break;
    case 'traveling':
      updateTraveling(dt, gameTime);
      drawTraveling(gameTime);
      break;
    case 'codex':
      updateCodex(dt);
      drawCodex(gameTime);
      break;
    case 'travel_map':
    case 'location_select':
      updateLocationSelect(dt);
      drawLocationSelect(gameTime);
      break;
    case 'fishing':
      updateFishing(dt, gameTime);
      drawFishing(gameTime);
      break;
    case 'minigame':
      updateMinigame(dt, gameTime);
      drawMinigame(gameTime);
      break;
    case 'perk_select':
      updatePerkSelect(dt);
      drawPerkSelect(gameTime);
      break;
    case 'inventory':
      updateInventory(dt);
      drawInventory(gameTime);
      break;
    case 'shop':
      updateShop(dt);
      drawShop(gameTime);
      break;
    case 'game_over':
      updateGameOver(dt);
      drawGameOver(gameTime);
      break;
    case 'village':
      updateVillage(dt, gameTime);
      drawVillage(gameTime);
      break;
    case 'npc_dialog':
      updateNpcDialog(dt);
      drawNpcDialog(gameTime);
      break;
    case 'fish_market':
      updateFishMarket(dt);
      drawFishMarket(gameTime);
      break;
    case 'building_upgrade':
      updateBuildingUpgrade(dt);
      drawBuildingUpgrade(gameTime);
      break;
    case 'village_inv':
      updateVillageInv(dt);
      drawVillageInv(gameTime);
      break;
  }

  updateParticles(dt);

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
